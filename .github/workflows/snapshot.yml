name: snapshot

on:
  schedule:
    # 平日(月-金)の日本市場時間帯は15分毎、それ以外は1時間毎
    - cron: "*/15 0-7 * * 1-5"   # 日本 9:00-16:45 JST (UTC 0:00-7:45)
    - cron: "0 * * * *"          # それ以外も毎時1回
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/**"
      - ".github/workflows/snapshot.yml"

permissions:
  contents: write

concurrency:
  group: snapshot
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install deps
        run: |
          pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Fetch data
        run: python scripts/fetch_data.py

      - name: Fetch analysis
        run: python scripts/fetch_analysis.py
        continue-on-error: true

      - name: Fetch advisor
        run: python scripts/fetch_advisor.py
        continue-on-error: true

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/snapshot.json data/analysis.json data/advisor.json data/nisa-holdings.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "no changes"
            exit 0
          fi
          git commit -m "auto: snapshot $(date -u +%Y-%m-%dT%H:%MZ)"
          git push
